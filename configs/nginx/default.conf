server {
    listen 80;
    server_name 72roll.ru www.72roll.ru;

    # ACME Challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 72roll.ru www.72roll.ru;

    ssl_certificate /etc/letsencrypt/live/72roll.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/72roll.ru/privkey.pem;

    # Backend API
    location /api {
        proxy_pass http://foodtech-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Panel (Laravel)
    location /admin {
        alias /var/www/html/admin/public;
        try_files $uri $uri/ @admin_laravel;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_pass foodtech-admin:9000;
        }
    }

    location @admin_laravel {
        rewrite /admin/(.*)$ /admin/index.php?/$1 last;
    }

    # Frontend (Built SPA)
    location / {
        proxy_pass http://foodtech-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
