server {
    listen 80;
    server_name 72roll.ru www.72roll.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 72roll.ru www.72roll.ru;

    ssl_certificate /etc/letsencrypt/live/72roll.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/72roll.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статические файлы сборки фронтенда админки (JS/CSS/assets)
    # Используем alias, чтобы путь /admin/build/ -> /var/www/html/admin/public/build/
    location /admin/build/ {
        alias /var/www/html/admin/public/build/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Admin Panel (Laravel) - должен быть ПОСЛЕ /admin/build/
    location /admin {
        alias /var/www/html/admin/public;
        index index.php index.html;
        try_files $uri $uri/ @admin_laravel;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_pass admin:9000;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param APP_URL https://72roll.ru/admin;
        }
    }

    location @admin_laravel {
        rewrite ^/admin/(.*)$ /admin/index.php?/$1 last;
    }

    location / {
        proxy_pass http://foodtech-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
