📘 Полное руководство по интеграции iikoServer API (Для ИИ)
Целевая аудитория: ИИ-ассистенты (в т.ч. Gemini), разработчики, системные архитекторы.
Цель документа: Обеспечить структурированную, детерминированную и исчерпывающую базу знаний для автоматической генерации кода интеграций с локальным сервером iiko (iikoRMS / iikoChain).
1. 🏁 С чего начать
Для начала работы с iikoServer API необходимо:
Убедиться, что сервер iikoRMS или iikoChain установлен, запущен и доступен по сети.
Знать IP-адрес или доменное имя сервера и порт (по умолчанию 8080 для RMS и 9080 для Chain).
Иметь учетную запись пользователя iiko с правами доступа к API (обычно создается специальный системный пользователь).
Знать логин и пароль этого пользователя (пароль передается в виде SHA-1 хеша в нижнем регистре).
2. ⚠️ Ограничения и рекомендации
Облачные системы с открытым API всегда имеют ограничения по использованию. Ниже находится список ключевых правил для работы с iikoServer:
Последовательность запросов: Запросы должны выполняться строго последовательно. Каждый следующий запрос отправляется только после получения ответа на предыдущий.
Период запроса данных: Запрашивайте данные за период не длиннее 1 месяца (в идеале — за день или неделю). Тяжелые запросы могут "положить" сервер.
Оптимизация OLAP-отчетов (buildSummary): Если итоговые строки в OLAP не нужны, обязательно передавайте buildSummary=false (или <buildSummary>false</buildSummary>). Для крупных сетей значение true приводит к зависанию сервера.
Поля в OLAP: Не более 7 полей одновременно.
Тестирование: Сначала проверяйте запросы на демо-сервере.
Частота запросов: Не чаще 1 раза в секунду.
Тайм-ауты: Устанавливайте разумные тайм-ауты (10-30 секунд).
Кэширование: Кэшируйте редко меняющиеся справочники (структура компании, склады, номенклатура, поставщики).
3. 🏗 Принципы работы и Архитектура
Базовый URL: http(s)://<адрес_сервера>:<порт>/resto/api/
Формат данных: * Версия 1 (v1): Преимущественно XML и параметры в URL. Content-Type: application/x-www-form-urlencoded (для POST) или application/xml (для PUT/импорта).
Версия 2 (v2): Преимущественно JSON. Content-Type: application/json.
Кодировка: Строго UTF-8.
HTTP Статусы: Успешное создание — 201 Created. Успешное обновление/чтение — 200 OK.
4. 🔐 Авторизация
При авторизации занимается один слот лицензии. Если лицензия одна, повторная авторизация без логаута вызовет ошибку. Токен передается как параметр ?key= или в cookie key.
Логин: GET /resto/api/auth?login={login}&pass={sha1passwordhash}
Возвращает строку-токен.
Логаут: GET /resto/api/logout?key={token}
Освобождает лицензию.
5. 🛑 Описание ошибок
Любой метод может вернуть текст ошибки в формате text/plain.
400 Bad Request: Ошибка в параметрах, формате или бизнес-логике (например, неверный формат даты).
401 Unauthorized: Токен не передан, истек таймаут сессии (обычно 1 час), сервер был перезагружен.
403 Forbidden: Нет лицензии на модуль (Module %s is blocked), превышено кол-во подключений, нет прав у пользователя.
404 Not Found: Объект или путь не найден.
409 Conflict: Ошибка бизнес-логики ("Доступ запрещен", "Отрицательные остатки" и т.д.). Текст ошибки нужно показать пользователю.
500 Internal Server Error: Внутренняя ошибка.
Полезно: Проверить свободные лицензии: GET /resto/api/licence/info?moduleId=28008806
6. 🏢 Корпорация
Подразделения: GET /corporation/departments?revisionFrom={rev}
Склады: GET /corporation/stores?revisionFrom={rev}
Группы отделений: GET /corporation/groups?revisionFrom={rev}
Терминалы: GET /corporation/terminals?revisionFrom={rev}
Поиск:
Подразделение по коду: GET /corporation/departments/search?code={regex}
Склад по коду: GET /corporation/stores/search?code={regex}
Группа по имени/ID: GET /corporation/groups/search?name={regex}&departmentId={uuid}
Терминал: GET /corporation/terminals/search?name={regex}&anonymous={true/false}
Настройки: GET /v2/corporation/settings (Возвращает JSON, напр. {"vatAccounting":"VAT_INCLUDED_IN_PRICE"})
7. 🍔 Номенклатура (v2 API - JSON)
Для работы требуются права B_EN "Редактирование номенклатурных справочников".
7.1 Элементы номенклатуры (Продукты/Блюда)
Получить список (GET/POST): /v2/entities/products/list?includeDeleted={bool}
Фильтры: ids, nums, codes, types, categoryIds, parentIds, revisionFrom.
Создать (POST): /v2/entities/products/save (передать JSON объекта).
Обновить (POST): /v2/entities/products/update?overrideFastCode=false&overrideNomenclatureCode=false (передать JSON с id).
Удалить (POST): /v2/entities/products/delete (Тело: {"items": [{"id": "UUID"}]})
Восстановить (POST): /v2/entities/products/restore
7.2 Номенклатурные группы
Получить (GET/POST): /v2/entities/products/group/list
Создать (POST): /v2/entities/products/group/save
Обновить (POST): /v2/entities/products/group/update
Удалить (POST): /v2/entities/products/group/delete (Можно передать списки products и productGroups для удаления).
Восстановить (POST): /v2/entities/products/group/restore
7.3 Пользовательские категории
Эндпоинты: /v2/entities/products/category/list, /save, /update, /delete, /restore
Структура: {"id": "...", "name": "Название", "deleted": false}
7.4 Работа с изображениями
Скачать: GET /v2/images/load?imageId={UUID} (Возвращает Base64 в поле data).
Загрузить: POST /v2/images/save (Тело: {"id": [byte array base64]}) - Макс 512Мб.
Удалить: POST /v2/images/delete (Тело: {"items": [{"id": "UUID"}]})
7.5 Работа со шкалой и размерами
Получить все шкалы: GET/POST /v2/entities/productScales
Получить по ID: GET /v2/entities/productScales/{id}
Создать/Обновить/Удалить шкалы: /v2/entities/productScales/save (или /update, /delete, /restore).
Привязка к продукту:
Получить шкалу продукта: GET /v2/entities/products/{productId}/productScale
Задать шкалу продукту: POST /v2/entities/products/{productId}/productScale
Удалить шкалу у продукта: DELETE /v2/entities/products/{productId}/productScale
8. 🔄 Репликация
Статусы всех репликаций (только Chain): GET /replication/statuses
Статус конкретного ТП: GET /replication/byDepartmentId/{departmentId}/status
Тип сервера: GET /replication/serverType (Возвращает: CHAIN, REPLICATED_RMS, STANDALONE_RMS).
9. 📝 Журнал событий
Требуется модуль API_EVENTS(2200) и право B_VTJ.
Получить список: GET /events?from_time={ISO}&to_time={ISO}&from_rev={число}. Используйте from_rev для поллинга новых событий!
Поиск по номеру заказа: POST /events (В теле список events и orderNums).
Добавить внешнее событие: POST /events/add (Передача eventsList в XML).
Дерево типов событий (метаданные): GET /events/metadata
Кассовые смены (сессии): GET /events/sessions?from_time={ISO}&to_time={ISO}
10. 🧑‍🤝‍🧑 Сотрудники и расписания
10.1 Сотрудники (API v1 - XML)
Список активных: GET /employees?includeDeleted=false&revisionFrom=-1
По подразделению: GET /employees/byDepartment/{departmentCode}
Поиск по ID: GET /employees/byId/{employeeUUID}
Поиск по коду: GET /employees/byCode/{employeeCode}
Поиск по параметрам: GET /employees/search?firstName={regexp}&middleName={regexp}
Добавить/Заменить по ID (PUT): PUT /employees/byId/{UUID} - полное замещение.
Добавить по коду (PUT): PUT /employees/byCode/{employeeCode}
Частичное обновление (POST): POST /employees/byId/{employeeUUID} - (Content-Type: application/x-www-form-urlencoded).
Удалить: GET /employees/byId/{employeeUUID} (пустой ответ при успехе).
10.2 Должности
Список должностей: GET /employees/roles?revisionFrom=-1
10.3 Оклады
Получить список окладов: GET /employees/salary
Получить оклад сотрудника: GET /employees/salary/byId/{employeeUUID}
Установить оклад: GET /employees/salary/byId/{employeeUUID}/{YYYY-MM-DD}?payment={сумма}
10.4 Смены и расписание
Типы смен: GET /employees/schedule/types
Получить смены: GET /employees/schedule/?from={YYYY-MM-DD}&to={YYYY-MM-DD}&withPaymentDetails=true (также доступны фильтры по employeeUUID и departmentId). Внимание: to включающая дата.
Создать смену: POST /employees/schedule/create
Обновить смену: POST /employees/schedule/update (ID смены может измениться!).
Удалить смену: POST /employees/schedule/byId/{scheduleUUID}
10.5 Явки
Типы явок: GET /employees/attendance/types
Получить явки: GET /employees/attendance?from={YYYY-MM-DD}&to={YYYY-MM-DD}&withPaymentDetails=true (также доступны фильтры по employeeUUID и departmentId). Внимание: to включающая дата.
Создать явку: POST /employees/attendance/create
Обновить явку: POST /employees/attendance/update (ID явки может измениться!).
Удалить явку: POST /employees/attendance/byId/{attendanceUUID}
10.6 Доступность сотрудников
Получить доступность: GET /employees/availability/list?from={YYYY-MM-DD}&to={YYYY-MM-DD}&department={uuid}&role={uuid}&user={uuid}
10.7 Бригады (только RMS для редактирования)
Все бригады: GET /employees/waiterTeams
По подразделению: GET /employees/waiterTeams/byDepartment/{departmentUUID}
По коду/ID/Поиск: GET /employees/waiterTeams/byCode/{code}, GET /employees/waiterTeams/byId/{uuid}, GET /employees/waiterTeams/search?name={regexp}
Создать по коду (PUT): PUT /employees/waiterTeams/byCode/{code}
Создать/Заменить по ID (PUT/POST): PUT (полное замещение), POST (частичное).
Удалить: GET /employees/waiterTeams/byId/{uuid}
Назначения в бригады (Изменение - только RMS): POST /employees/waiterTeams/assignments
Назначения (Чтение - RMS и Chain): GET /employees/waiterTeams/assignments (на Chain), GET /employees/waiterTeams/assignments/byDepartment/{departmentId}
11. 🕒 Кассовые смены и платежи (v2 API - JSON)
Требуются права: B_APIO (просмотр) и F_APIO (выполнение изъятий).
11.1 Кассовые смены
Список смен: GET /v2/cashshifts/list?openDateFrom={YYYY-MM-DD}&openDateTo={YYYY-MM-DD}&status={ANY|OPEN|CLOSED|ACCEPTED|UNACCEPTED|HASWARNINGS}
Смена по ID: GET /v2/cashshifts/byId/{sessionId}
Платежи (внесения/изъятия/безнал) за смену: GET /v2/cashshifts/payments/list/{sessionId}?hideAccepted=false
Документ принятия смены: GET /v2/cashshifts/closedSessionDocument/{id}
Принять кассовую смену: POST /v2/cashshifts/save
Алгоритм:
Получить список смен, выбрать нужную.
Получить документ принятия GET /v2/cashshifts/closedSessionDocument/{id}.
Получить проводки (платежи) GET /v2/cashshifts/payments/list/{sessionId}.
Дополнить items документа принятия недостающими проводками из п.3. Для каждой новой проводки указать transactionId, status, для изъятий указать sumReal.
Отправить обновленный документ через POST /v2/cashshifts/save.
11.2 Внесения и Изъятия
Типы внесений/изъятий: GET /v2/entities/payInOutTypes/list
Совершить изъятие: POST /v2/payInOuts/addPayOut
Параметры тела JSON: payOutTypeId, payOutDate, counteragent, departmentSumMap (UUID ТП -> сумма), payrollId (опционально, для расчетов с сотрудниками), comment.
Платежные ведомости (для изъятий ЗП): GET /v2/payrolls/list?dateFrom={YYYY-MM-DD}&dateTo={YYYY-MM-DD}&department={uuid}
12. 📄 Документооборот (Создание и импорт)
Универсальный процесс импорта:
POST /documents/import с телом XML. Получение correlationId.
GET /documents/import/status?correlationId={id}. Ожидание статуса SUCCESS или ERROR.
Поддерживаемые документы:
<incomingInvoice> — Приходная накладная
<outgoingInvoice> — Расходная накладная
<internalTransfer> — Внутреннее перемещение
<inventory> — Инвентаризация
<writeoffDocument> — Акт списания
<productionDocument> — Акт приготовления
13. 📊 Отчеты OLAP
Версия 1 (XML)
POST /reports/olap
Структура: <reportRequest><reportType>SALES</reportType>...
Версия 2 (JSON)
POST /v2/reports/olap
Используется для гибкого построения отчетов.
Параметры:
reportType: Тип отчета (например, "SALES").
groupByRowFields: Массив группировок (например, ["PayTypes", "OpenDate"], ["DishName", "CashRegisterName"], ["HourClose"], ["WaiterName"], ["DishCategory"]).
aggregateFields: Массив вычисляемых полей ("GuestNum", "DishSumInt", "DishDiscountSumInt", "UniqOrderId").
filters: Объект с фильтрами (DateRange для дат, IncludeValues/ExcludeValues для статусов).
14. 💻 Готовые примеры кода (Python)
import hashlib
import requests
import time

class IikoServerAPI:
    def __init__(self, base_url, login, password):
        self.base_url = base_url.rstrip('/') + '/resto/api'
        self.login = login
        self.password_hash = hashlib.sha1(password.encode('utf-8')).hexdigest()
        self.token = None

    def auth(self):
        url = f"{self.base_url}/auth?login={self.login}&pass={self.password_hash}"
        response = requests.get(url)
        response.raise_for_status()
        self.token = response.text
        return self.token

    def logout(self):
        if self.token:
            requests.get(f"{self.base_url}/logout?key={self.token}")
            self.token = None

    def get_products_v2(self):
        """Пример работы с V2 (JSON)"""
        if not self.token: self.auth()
        url = f"{self.base_url}/v2/entities/products/list?key={self.token}&includeDeleted=false"
        response = requests.get(url)
        response.raise_for_status()
        return response.json()

    def get_sales_olap_v2(self, date_from, date_to):
        """Пример вызова аналитики V2 (JSON)"""
        if not self.token: self.auth()
        url = f"{self.base_url}/v2/reports/olap?key={self.token}"
        payload = {
            "reportType": "SALES",
            "groupByRowFields": ["OpenDate"],
            "aggregateFields": ["DishSumInt", "DishDiscountSumInt"],
            "filters": {
                "OpenDate": {
                    "filterType": "DateRange",
                    "periodType": "CUSTOM",
                    "from": date_from,
                    "to": date_to
                },
                "DeletedWithWriteoff": {
                    "filterType": "IncludeValues",
                    "values": ["NOT_DELETED"]
                }
            }
        }
        response = requests.post(url, json=payload)
        response.raise_for_status()
        return response.json()


15. 🚨 Чек-лист проверок для ИИ при генерации кода
[ ] Хеширование: Убедиться, что реализовано SHA1-хеширование пароля перед /auth.
[ ] Управление сессией: Токен переиспользуется. Желательно вызывать /logout по завершении скрипта для освобождения лицензии.
[ ] Тайм-ауты: Все HTTP-запросы должны иметь параметр timeout.
[ ] Очередность: Строго синхронное выполнение (дождаться ответа перед следующим запросом).
[ ] Обработка ошибок: Проверять коды 400, 401, 409 и читать тело ответа (text/plain) для детализации.
[ ] Форматы: Использовать JSON для /v2/ эндпоинтов и XML для /v1/ и /documents/import.
[ ] Асинхронность импорта документов: При вызове /documents/import обязательно реализовывать цикл (поллинг) для проверки correlationId.
[ ] Оптимизация OLAP: Период не более 1 месяца. Если итоги не нужны, строго передавать buildSummary=false.
